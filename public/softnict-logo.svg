<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Neural node mark: three connected dots forming an S-curve path -->
  <circle cx="10" cy="20" r="3.5" fill="#0EA5E9"/>
  <circle cx="20" cy="11" r="3.5" fill="#0EA5E9" opacity="0.85"/>
  <circle cx="20" cy="29" r="3.5" fill="#0EA5E9" opacity="0.85"/>
  <circle cx="30" cy="20" r="3.5" fill="#0EA5E9" opacity="0.7"/>
  <!-- Connecting lines -->
  <line x1="10" y1="20" x2="20" y2="11" stroke="#0EA5E9" stroke-width="1.2" opacity="0.5"/>
  <line x1="10" y1="20" x2="20" y2="29" stroke="#0EA5E9" stroke-width="1.2" opacity="0.5"/>
  <line x1="20" y1="11" x2="30" y2="20" stroke="#0EA5E9" stroke-width="1.2" opacity="0.5"/>
  <line x1="20" y1="29" x2="30" y2="20" stroke="#0EA5E9" stroke-width="1.2" opacity="0.5"/>
  <!-- Cross connection -->
  <line x1="20" y1="11" x2="20" y2="29" stroke="#0EA5E9" stroke-width="0.8" opacity="0.25"/>
  <!-- Wordmark: SOFTNICT -->
  <text x="42" y="27" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="white">SOFTNICT</text>
</svg>
